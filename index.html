<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>stephenknot</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #050505;
      color: #e8e8e8;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(100%, 42rem);
      padding: 2rem;
    }

    .mark {
      font-size: clamp(1.1rem, 2vw, 1.45rem);
      font-weight: 400;
      letter-spacing: 0.015em;
      line-height: 1.6;
    }

    .mark a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 232, 232, 0.35);
    }

    .mark a:hover {
      border-bottom-color: rgba(232, 232, 232, 0.9);
    }

    .small {
      margin-top: 4rem;
      color: #555;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dot {
      display: inline-block;
      width: 0.45rem;
      height: 0.45rem;
      margin-left: 0.35rem;
      border-radius: 50%;
      background: #e8e8e8;
      opacity: 0.18;
      vertical-align: middle;
    }

    @media (prefers-reduced-motion: no-preference) {
      .dot {
        animation: pulse 5.5s infinite;
      }

      @keyframes pulse {
        0%, 82%, 100% { opacity: 0.12; }
        86% { opacity: 0.9; }
        89% { opacity: 0.18; }
        93% { opacity: 0.55; }
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="mark" aria-label="Landing page">
      this is not a portfolio.<br>
      this is not a startup.<br>
      this is not an accident.<br><br>

      <a href="mailto:hello@stephenknot.com">leave something here</a>
      <span class="dot" aria-hidden="true"></span>
    </section>

    <div class="small">
      stephenknot.com / skrrt skrrt
    </div>
  </main>
</body>
</html>
